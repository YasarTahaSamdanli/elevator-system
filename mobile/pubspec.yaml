name: asansor_mobile
description: Asansör bakım ve servis yönetimi — teknisyen saha uygulaması.
publish_to: "none"
version: 0.1.0+1

# Dart 3.6 = Flutter 3.27+ (Color.withValues vb. API'ler için alt sınır)
environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  intl: ^0.19.0
  google_generative_ai: ^0.4.0
  mobile_scanner: ^6.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
